services:
  postgres:
    image: postgres:16
    container_name: payiq-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payiq
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payiq"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - payiq_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: payiq-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - payiq_redis_data:/data

volumes:
  payiq_postgres_data:
  payiq_redis_data:
